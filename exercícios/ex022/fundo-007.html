<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alinhamento de imagens</title>
    <style>

    #container {
        background-color: rgb(31, 221, 255);
        background-image: url(imagens/target001.png);

        position: relative;
        background-size: 100% 100%;
        height: 100vh;
        padding: 15px;
    }        

    #conteudo {
        background-color: rgb(253, 51, 0);
        background-image: url(imagens/target001.png);

        position: absolute;
        background-size: 100% 100%;
        height: 200px;
        width: 350px;
        border: 2px solid black;

        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
    }
    </style>
</head>
<body>
    <section id="container">
        <article id="conteudo">

        </article>
    </section>
</body>
</html>
