<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>grupamento de colunas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
        }

        caption {
            font-size: 1.3em;
            font-weight: bolder;
            padding: 5px;
        }

        th, td {
            padding: 10px;
            border: 1px solid black;
            width: 100px;
        }

        .Csexo, .Cidade {
            background-color: rgb(255, 255, 0);
        }

        div#container {
            overflow-x: auto;
        }
    </style>
</head>
<body>
    <h1>Exercício de tabela</h1>
    <div id="container">
        <table>
            <colgroup>
                <col class="Cnome">
                <col class="Csexo">
                <col class="Cidade">
                <col class="Cprofissão">
            </colgroup>
            <caption>Cadastro</caption>
            <tr>
                <th scope="col">Nome</th>
                <th scope="col">Sexo</th>
                <th scope="col">Idade</th>
                <th scope="col">Profissão</th>
            </tr>
            <tr>
                <td>Ana Maria</td>
                <td>F</td>
                <td>25</td>
                <td>jornalista</td>
            </tr>
            <tr>
                <td>Cláudio</td>
                <td>M</td>
                <td>30</td>
                <td>Gerente</td>
            </tr>
            <tr>
                <td>Gustavo</td>
                <td>M</td>
                <td>26</td>
                <td>Garçom</td>
            </tr>
            <tr>
                <td>João</td>
                <td>M</td>
                <td>18</td>
                <td>Pedreiro</td>
            </tr>
            <tr>
                <td>Pedro</td>
                <td>M</td>
                <td>25</td>
                <td>Caminhoneiro</td>
            </tr>
            <tr>
                <td>Thiago</td>
                <td>M</td>
                <td>22</td>
                <td>Programador</td>
            </tr>
        </table>
    </div>
</body>
</html>
