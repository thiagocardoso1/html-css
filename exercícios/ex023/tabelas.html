<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        table {
            border-collapse: collapse;
            width: 400px;
            border: 2px solid rgba(255, 0, 0, 0.473);
            
        }

        tr#tr1 {
            background-color: rgba(0, 255, 13, 0.644);
        }

        td {
            border: 1px solid black ;
            padding: 8px;
        }

        td#td1 {
            background-color: rgba(255, 255, 0, 0.664);
        }
    </style>
</head>
<body>
    <h1>Primeira tabela</h1>
    <table>
        <tr id="tr1">
            <td>A 1</td>
            <td>A 2</td>
            <td>A 3</td>
            <td>A 4</td>
        </tr>
        <tr>
            <td>B 1</td>
            <td>B 2</td>
            <td>B 3</td>
            <td>B 4</td>
        </tr>
        <tr>
            <td id="td1">C 1</td>
            <td>C 2</td>
            <td>C 3</td>
            <td>C 4</td>
        </tr>
        <tr>
            <td>D 1</td>
            <td>D 2</td>
            <td>D 3</td>
            <td>D 4</td>
        </tr>
    </table>
</body>
</html>
