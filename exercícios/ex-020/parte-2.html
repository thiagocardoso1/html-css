<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Parte 2 do exercíciot</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        div > p {
            display: none;
        }

        div:hover {
            color: blue;;
        }

        div:hover > p {
            display: block;
        }
    </style>
</head>
<body>
    <h1>Testando o div:hover</h1>
    <p>Leia o texto abaixo.</p>
    <div>
        Passe o mouse aqui para perceber uma verdade sobre você!
        <p>Você é gay amigo</p>
    </div>
    <p>Hihihi.</p>
</body>
</html>
