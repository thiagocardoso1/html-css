<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulários</title>
</head>
<body>
    <form action="cadastro.php" method="post">
        <p>
            <label for="icolor">Escolha uma cor</label>
            <input type="color" name="color" id="icolor" value="#70cfff">
        </p>

        <p>
            <label for="isatis">Nível de satisfação</label>
            <input type="range" name="satis" id="isatis" min="1" max="5" value="3">
        </p>

        <p>
            <label for="ifile">Escolha uma imagem</label>
            <input type="file" name="file" id="ifile">
        </p>

        <p>
            <input type="reset" value="Limpar">
            <input type="submit" value="Enviar">
        </p>
    </form>
</body>
</html>
