<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iframes</title>
    <style>
        iframe {
            height: 500px;
            width: 400px;
            border: 1px solid black;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <h1>Testando o uso de iframes</h1>
    <p>
        Aqui temos o site do
        
        <iframe src="https://cursoemvideo.com" frameborder="0"></iframe>
        <a href="https://cursoemvideo.com"></a>
        
        para acessar.
    </p>
    <p>Também temos o canal do 
        
        <iframe src="https://www.youtube.com/c/Japetaoficial/videos" frameborder="0"></iframe>
        <a href="https://www.youtube.com/c/Japetaoficial/videos"></a>
        
       para assistir muitas gameplays
    </p>
</body>
</html>
