<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Utilizando pseudo-classes</title>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
        }

        a {
            color: red;
            text-decoration: none;
        }

        a:visited {
            color: rgb(121, 0, 0);
        }

        a:active {
            color: blue;
        }

        a.batata::after {
            content:'....'
        }

        a.batata::before {
            content: '....';
        }

        div > p{
            display: none;
        }

        div:hover > p {
            display: block;
            color: blue;
        }
    </style>
</head>
<body>
    <h1>Links Aleatórios</h1>
    <a href="https://www.twitch.tv/alanzoka" class="batata">Gameplays de autíssimo nível</a><br>
    <a href="https://www.twitch.tv/marinaul" class="batata">Lives de Coc de autíssimo nível</a><br>
    <a href="https://stardewvalley.fandom.com/wiki/Stardew_Valley_Wiki" class="batata">Fandom de autíssimo nível</a><br>
    <div>
        .
        <p>Macaco geladinho</p>
    </div>
</body>
</html>
